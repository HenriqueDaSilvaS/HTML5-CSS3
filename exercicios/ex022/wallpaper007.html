<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento dVertical</title>
    <style>
#container{
    position: relative;
    height: 500px;
    padding: 10px;
    background-color: rgb(0, 0, 0);

}

#conteudo{
    position: absolute;
    height: 200px;
    width: 400px;
    
    background-color: rgb(255, 0, 0);

    left: 50%;
    top: 50%;
    transform: translate();
}



    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
